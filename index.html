<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Duo — A daily space for two</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --cream:#F8EFE3;
    --cream-2:#F1E6D6;
    --paper:#FFFCF6;
    --wine:#7A2B3D;
    --wine-dark:#5A1F2D;
    --wine-light:#9A4458;
    --blush:#D9A0A8;
    --blush-light:#EFD7DA;
    --gold:#C9A14A;
    --gold-light:#E8D6A8;
    --ink:#3A2A28;
    --ink-soft:#6B5552;
    --line:rgba(58,42,40,0.12);
    --shadow-soft: 0 8px 24px rgba(90,31,45,0.08);
    --shadow-card: 0 2px 14px rgba(90,31,45,0.07);
    --r-sm:10px;
    --r-md:18px;
    --r-lg:28px;
    --ease: cubic-bezier(.22,.61,.36,1);
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    width:100%; height:100%;
    background:var(--cream);
    color:var(--ink);
    font-family:'Plus Jakarta Sans', sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{
    font-family:'Fraunces', serif;
    font-weight:500;
    letter-spacing:-0.01em;
  }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; }
  input, textarea{ font-family:inherit; }
  ::selection{ background:var(--blush-light); }
  a{ color:inherit; text-decoration:none; }

  /* ---------- App shell ---------- */
  #app{
    position:relative;
    width:100%; height:100%;
    max-width:480px;
    margin:0 auto;
    background:var(--cream);
    overflow:hidden;
    box-shadow: 0 0 60px rgba(90,31,45,0.12);
  }
  @media (min-width:481px){
    body{ display:flex; align-items:center; justify-content:center; }
    #app{ height:92vh; max-height:900px; border-radius:32px; }
  }

  /* ---------- Background art layer ---------- */
  .bg-art{
    position:absolute; inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
  }
  .blob{
    position:absolute;
    border-radius:50%;
    filter:blur(0px);
    opacity:0.55;
    will-change:transform;
  }
  .blob-1{ width:340px; height:340px; background:radial-gradient(circle at 35% 35%, var(--blush-light), transparent 70%); top:-120px; left:-100px; animation: drift1 26s ease-in-out infinite; }
  .blob-2{ width:280px; height:280px; background:radial-gradient(circle at 60% 40%, var(--gold-light), transparent 70%); bottom:-80px; right:-90px; animation: drift2 32s ease-in-out infinite; }
  .blob-3{ width:220px; height:220px; background:radial-gradient(circle at 50% 50%, var(--blush), transparent 75%); top:40%; right:-110px; opacity:0.28; animation: drift3 22s ease-in-out infinite; }

  @keyframes drift1{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(30px,40px) scale(1.08); }
  }
  @keyframes drift2{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(-25px,-30px) scale(1.05); }
  }
  @keyframes drift3{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(-20px,30px) scale(0.95); }
  }

  .doodles{ position:absolute; inset:0; opacity:0.5; }
  .doodles svg{ position:absolute; }
  .doodle{ stroke:var(--wine); stroke-width:1.4; fill:none; opacity:0.35; }
  .d1{ top:8%; left:8%; width:34px; animation: float1 9s ease-in-out infinite; }
  .d2{ top:18%; right:12%; width:26px; animation: float2 11s ease-in-out infinite; }
  .d3{ bottom:14%; left:14%; width:30px; animation: float3 10s ease-in-out infinite; }
  .d4{ bottom:30%; right:8%; width:22px; animation: float1 8s ease-in-out infinite; }
  .d5{ top:45%; left:6%; width:20px; animation: float2 13s ease-in-out infinite; }

  @keyframes float1{ 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-12px) rotate(6deg); } }
  @keyframes float2{ 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(10px) rotate(-8deg); } }
  @keyframes float3{ 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-8px) rotate(4deg); } }

  /* ---------- Screen / router ---------- */
  .screen-stack{
    position:relative;
    width:100%; height:100%;
    z-index:1;
  }
  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    opacity:0; pointer-events:none;
    transform: translateY(14px) scale(0.985);
    transition: opacity .42s var(--ease), transform .42s var(--ease);
  }
  .screen.active{
    opacity:1; pointer-events:auto;
    transform: translateY(0) scale(1);
  }
  .screen.leaving{
    opacity:0;
    transform: translateY(-10px) scale(0.985);
  }

  .scroll-area{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding: 0 22px 100px;
  }
  .scroll-area::-webkit-scrollbar{ display:none; }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 22px 22px 6px;
    flex-shrink:0;
  }
  .topbar h1{ font-size:22px; }
  .icon-btn{
    width:38px; height:38px;
    display:flex; align-items:center; justify-content:center;
    border-radius:50%;
    background:rgba(255,255,255,0.6);
    border:1px solid var(--line);
    transition: transform .2s var(--ease), background .2s;
  }
  .icon-btn:active{ transform:scale(0.92); }
  .icon-btn svg{ width:18px; height:18px; stroke:var(--wine); }

  /* ---------- Buttons ---------- */
  .btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%;
    padding:15px 20px;
    border-radius:var(--r-md);
    font-size:15px; font-weight:600;
    transition: transform .15s var(--ease), box-shadow .2s var(--ease), background .2s;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{
    background: var(--wine);
    color: var(--paper);
    box-shadow: var(--shadow-soft);
  }
  .btn-primary:hover{ background: var(--wine-dark); }
  .btn-ghost{
    background: rgba(255,255,255,0.7);
    color: var(--ink);
    border:1px solid var(--line);
  }
  .btn-gold{
    background: linear-gradient(135deg, var(--gold), #B9893A);
    color: #fff;
    box-shadow: var(--shadow-soft);
  }
  .btn-google{
    background:#fff;
    color:#3A2A28;
    border:1px solid var(--line);
    box-shadow: var(--shadow-card);
  }
  .btn-sm{ padding:10px 16px; font-size:13px; width:auto; border-radius:var(--r-sm); }
  .btn[disabled]{ opacity:0.5; pointer-events:none; }

  /* ---------- Card ---------- */
  .card{
    background: var(--paper);
    border-radius: var(--r-lg);
    border:1px solid var(--line);
    box-shadow: var(--shadow-card);
  }

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    position:absolute; bottom:0; left:0; right:0;
    display:flex;
    background: rgba(248,239,227,0.92);
    backdrop-filter: blur(10px);
    border-top:1px solid var(--line);
    padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
    z-index:5;
  }
  .nav-item{
    flex:1;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:6px 0;
    color: var(--ink-soft);
    transition: color .2s, transform .2s var(--ease);
  }
  .nav-item svg{ width:21px; height:21px; stroke:currentColor; fill:none; transition:transform .25s var(--ease); }
  .nav-item.active{ color: var(--wine); }
  .nav-item.active svg{ transform: translateY(-2px) scale(1.05); }
  .nav-item span{ font-size:11px; font-weight:600; }
  .nav-item:active{ transform:scale(0.93); }

  /* ---------- Utility ---------- */
  .muted{ color: var(--ink-soft); }
  .center{ display:flex; align-items:center; justify-content:center; }
  .row{ display:flex; align-items:center; }
  .gap8{ gap:8px; } .gap12{ gap:12px; } .gap16{ gap:16px; }
  .stack{ display:flex; flex-direction:column; }
  .fade-in{ animation: fadeUp .5s var(--ease) both; }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }

  input.field, textarea.field{
    width:100%;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--r-sm);
    padding:13px 14px;
    font-size:14.5px;
    color:var(--ink);
    transition: border-color .2s, box-shadow .2s;
  }
  input.field:focus, textarea.field:focus{
    outline:none;
    border-color: var(--wine-light);
    box-shadow: 0 0 0 3px rgba(122,43,61,0.12);
  }
  textarea.field{ resize:none; line-height:1.5; }

  .badge{
    display:inline-flex; align-items:center; gap:5px;
    font-size:11px; font-weight:700;
    padding:4px 10px;
    border-radius:100px;
  }
  .badge-gold{ background:var(--gold-light); color:#7A5A1C; }
  .badge-wine{ background:var(--blush-light); color:var(--wine-dark); }

  /* toast */
  #toast{
    position:absolute; bottom:96px; left:50%;
    transform: translate(-50%, 10px);
    background: var(--ink);
    color: var(--cream);
    font-size:13px; font-weight:500;
    padding:11px 18px;
    border-radius:100px;
    opacity:0; pointer-events:none;
    transition: opacity .3s var(--ease), transform .3s var(--ease);
    z-index:50;
    white-space:nowrap;
  }
  #toast.show{ opacity:1; transform:translate(-50%, 0); }
</style>
</head>
<body>
<div id="app">

  <div class="bg-art">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="doodles">
      <svg class="doodle d1" viewBox="0 0 40 40"><path d="M20 32 C8 24 6 14 14 11 C19 9 20 14 20 14 C20 14 21 9 26 11 C34 14 32 24 20 32Z"/></svg>
      <svg class="doodle d2" viewBox="0 0 40 40"><circle cx="20" cy="20" r="9"/><path d="M20 4v6M20 30v6M4 20h6M30 20h6"/></svg>
      <svg class="doodle d3" viewBox="0 0 40 40"><rect x="6" y="10" width="28" height="22" rx="3"/><circle cx="20" cy="21" r="6"/><circle cx="27" cy="15" r="1.4"/></svg>
      <svg class="doodle d4" viewBox="0 0 40 40"><path d="M6 20c0-8 6-14 14-14s14 6 14 14-6 14-14 14"/><path d="M20 14v12M14 20h12"/></svg>
      <svg class="doodle d5" viewBox="0 0 40 40"><path d="M20 4l4 12h12l-10 8 4 12-10-8-10 8 4-12-10-8h12z"/></svg>
    </div>
  </div>

  <div class="screen-stack" id="screenStack"></div>
  <div id="toast"></div>
</div>

<script>
/* =========================================================
   DUO — connected to a real Supabase backend
   Auth: Google OAuth via Supabase Auth
   Data: Postgres tables (folders, members, entries, posts, chat)
   Photos: Supabase Storage bucket "photos"
   ========================================================= */

const SUPABASE_URL = 'https://nibfhkilhuiueuvmufbq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pYmZoa2lsaHVpdWV1dm11ZmJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NTAyMDksImV4cCI6MjA5NzUyNjIwOX0.anmbVyrgnqBJTl6e8S8_37Cx783Vf6SoOIV2PJm5i1Y';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* In-memory app state (mirrors what the UI reads). Hydrated from
   Supabase on load and after every write, instead of localStorage. */
let state = {
  user: null,        // { id, name, email }
  folders: [],        // [{ id, name, ownerId, plan, members:[...], entries:[...], inviteCode }]
  activeFolderId: null
};

const PLANS = [
  { id:'free',    name:'Free',    price:0, priceYear:0,  members:2,  dailyPhotos:1, ownFolders:1, color:'wine' },
  { id:'plus',    name:'Plus',    price:3, priceYear:30, members:5,  dailyPhotos:3, ownFolders:1, color:'wine' },
  { id:'premium', name:'Premium', price:5, priceYear:50, members:10, dailyPhotos:8, ownFolders:1, color:'gold' },
];

function planOf(id){ return PLANS.find(p=>p.id===id) || PLANS[0]; }

function ownedFolderCount(){
  const myId = state.user?.id;
  if(!myId) return 0;
  return state.folders.filter(f=>f.ownerId===myId).length;
}

function todayKey(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function uid(){ return Math.random().toString(36).slice(2,10); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.classList.remove('show'), 2000);
}

/* ---------------- Supabase data layer ---------------- */

// Pull everything the signed-in user can see (their folder(s), members,
// entries, posts, chat) and rebuild `state.folders` in the shape the UI expects.
async function refreshFolders(){
  if(!state.user) { state.folders = []; return; }

  const { data: memberRows, error: memErr } = await sb
    .from('folder_members')
    .select('folder_id')
    .eq('user_id', state.user.id);
  if(memErr){ console.error(memErr); showToast('Could not load your folder'); return; }

  const folderIds = memberRows.map(r => r.folder_id);
  if(folderIds.length === 0){ state.folders = []; return; }

  const { data: folderRows, error: fErr } = await sb
    .from('folders')
    .select('id, name, owner_id, plan, invite_code')
    .in('id', folderIds);
  if(fErr){ console.error(fErr); showToast('Could not load folder details'); return; }

  const folders = [];
  for(const f of folderRows){
    const { data: members } = await sb
      .from('folder_members')
      .select('user_id, profiles(id, name, email)')
      .eq('folder_id', f.id);

    const { data: entryRows } = await sb
      .from('entries')
      .select('id, entry_date')
      .eq('folder_id', f.id)
      .order('entry_date', { ascending: false });

    const entries = [];
    for(const e of (entryRows || [])){
      const { data: postRows } = await sb
        .from('posts')
        .select('author_id, photo_urls, caption, profiles(name)')
        .eq('entry_id', e.id);
      const { data: chatRows } = await sb
        .from('chat_messages')
        .select('author_id, text, created_at, profiles(name)')
        .eq('entry_id', e.id)
        .order('created_at', { ascending: true });

      entries.push({
        id: e.id,
        date: e.entry_date,
        posts: (postRows||[]).map(p=>({
          authorId: p.author_id,
          authorName: p.profiles?.name || 'Someone',
          photos: p.photo_urls || [],
          caption: p.caption,
          date: e.entry_date
        })),
        chat: (chatRows||[]).map(c=>({
          authorId: c.author_id,
          authorName: c.profiles?.name || 'Someone',
          text: c.text,
          ts: new Date(c.created_at).getTime()
        }))
      });
    }

    folders.push({
      id: f.id,
      name: f.name,
      ownerId: f.owner_id,
      plan: f.plan,
      inviteCode: f.invite_code,
      members: (members||[]).map(m=>({
        id: m.user_id,
        name: m.profiles?.name || 'Someone',
        email: m.profiles?.email || ''
      })),
      entries
    });
  }
  state.folders = folders;
}

async function createFolderRemote(name){
  const inviteCode = Math.random().toString(36).slice(2,8).toUpperCase();
  alert('About to insert with owner_id: ' + JSON.stringify(state.user.id) + ' (type: ' + typeof state.user.id + ')');
  const { data: folder, error } = await sb
    .from('folders')
    .insert({ name, owner_id: state.user.id, plan: 'free', invite_code: inviteCode })
    .select()
    .single();
  if(error){ alert('Insert error: ' + JSON.stringify(error)); console.error(error); showToast('Could not create the folder'); return null; }

  const { error: memErr } = await sb
    .from('folder_members')
    .insert({ folder_id: folder.id, user_id: state.user.id });
  if(memErr){ console.error(memErr); showToast('Folder created, but joining it failed'); }

  await refreshFolders();
  return folder.id;
}

async function joinFolderRemote(code){
  const { data: folder, error } = await sb
    .from('folders')
    .select('id, plan')
    .eq('invite_code', code)
    .maybeSingle();
  if(error){ console.error(error); showToast('Something went wrong looking up that code'); return null; }
  if(!folder){ showToast('No folder found with that code'); return null; }

  const { count } = await sb
    .from('folder_members')
    .select('*', { count: 'exact', head: true })
    .eq('folder_id', folder.id);
  const plan = planOf(folder.plan);
  if((count||0) >= plan.members){
    showToast('That folder is full for its current plan');
    return null;
  }

  const { error: joinErr } = await sb
    .from('folder_members')
    .upsert({ folder_id: folder.id, user_id: state.user.id }, { onConflict: 'folder_id,user_id' });
  if(joinErr){ console.error(joinErr); showToast('Could not join the folder'); return null; }

  await refreshFolders();
  return folder.id;
}

async function setFolderPlanRemote(folderId, planId){
  const { error } = await sb.from('folders').update({ plan: planId }).eq('id', folderId);
  if(error){ console.error(error); showToast('Could not change the plan'); return false; }
  await refreshFolders();
  return true;
}

async function uploadPhotosRemote(folderId, files){
  const urls = [];
  for(const file of files){
    const path = `${folderId}/${state.user.id}/${todayKey()}-${uid()}-${file.name}`;
    const { error } = await sb.storage.from('photos').upload(path, file, { upsert: true });
    if(error){ console.error(error); showToast('A photo failed to upload'); continue; }
    const { data } = sb.storage.from('photos').getPublicUrl(path);
    urls.push(data.publicUrl);
  }
  return urls;
}

async function postEntryRemote(folderId, photoUrls, caption){
  const date = todayKey();
  let { data: entry } = await sb
    .from('entries')
    .select('id')
    .eq('folder_id', folderId)
    .eq('entry_date', date)
    .maybeSingle();

  if(!entry){
    const { data: created, error: createErr } = await sb
      .from('entries')
      .insert({ folder_id: folderId, entry_date: date })
      .select()
      .single();
    if(createErr){ console.error(createErr); showToast('Could not save today\'s entry'); return false; }
    entry = created;
  }

  const { error } = await sb
    .from('posts')
    .upsert({ entry_id: entry.id, author_id: state.user.id, photo_urls: photoUrls, caption }, { onConflict: 'entry_id,author_id' });
  if(error){ console.error(error); showToast('Could not save your post'); return false; }

  await refreshFolders();
  return true;
}

async function sendChatRemote(folderId, text){
  const date = todayKey();
  let { data: entry } = await sb
    .from('entries')
    .select('id')
    .eq('folder_id', folderId)
    .eq('entry_date', date)
    .maybeSingle();

  if(!entry){
    const { data: created, error: createErr } = await sb
      .from('entries')
      .insert({ folder_id: folderId, entry_date: date })
      .select()
      .single();
    if(createErr){ console.error(createErr); showToast('Could not send the message'); return false; }
    entry = created;
  }

  const { error } = await sb
    .from('chat_messages')
    .insert({ entry_id: entry.id, author_id: state.user.id, text });
  if(error){ console.error(error); showToast('Message did not send'); return false; }

  await refreshFolders();
  return true;
}

/* ---------------- Auth ---------------- */
async function refreshSessionAndProfile(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){ state.user = null; return; }

  let { data: profile } = await sb
    .from('profiles')
    .select('id, name, email')
    .eq('id', session.user.id)
    .maybeSingle();

  if(!profile){
    // Profile row may not exist yet if the trigger hasn't run — create a fallback.
    const fallbackName = session.user.user_metadata?.full_name
      || session.user.user_metadata?.name
      || session.user.email?.split('@')[0]
      || 'You';
    await sb.from('profiles').upsert({
      id: session.user.id,
      name: fallbackName,
      email: session.user.email
    });
    profile = { id: session.user.id, name: fallbackName, email: session.user.email };
  }

  state.user = { id: profile.id, name: profile.name, email: profile.email };
}

async function signInWithGoogle(){
  // Use a clean URL (no leftover #access_token or query params from a
  // previous redirect) so Supabase can reliably parse the callback.
  const cleanUrl = window.location.origin + window.location.pathname;
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: cleanUrl }
  });
  if(error){ console.error(error); showToast('Google sign-in could not start'); }
}

async function signOutUser(){
  await sb.auth.signOut();
  state.user = null;
  state.folders = [];
  state.activeFolderId = null;
}

/* ---------------- Router ---------------- */
const stack = document.getElementById('screenStack');
let current = null;

function navigate(name, params={}){
  const html = SCREENS[name](params);
  const next = document.createElement('div');
  next.className = 'screen';
  next.dataset.screen = name;
  next.innerHTML = html;
  stack.appendChild(next);

  requestAnimationFrame(()=>{
    next.classList.add('active');
    if(current){
      current.classList.add('leaving');
      current.classList.remove('active');
    }
    setTimeout(()=>{
      if(current) current.remove();
      current = next;
      bindScreen(name, params);
    }, 420);
  });
}

function bindScreen(name, params){
  if(BINDERS[name]) BINDERS[name](params);
}

/* ---------------- Icons (Tabler-ish inline) ---------------- */
const ICON = {

function icon(name, cls=''){ return `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="${cls}">${ICON[name]||''}</svg>`; }

/* ---------------- Mock photo placeholders ---------------- */
function placeholderPhoto(seed, w=320,h=320){
  const hues = ['#E7C9CE','#E9D8B6','#D7C7DE','#C9DAD0','#E0CDBE'];
  const c = hues[seed.length % hues.length];
  return `data:image/svg+xml;utf8,${encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">
      <rect width="100%" height="100%" fill="${c}"/>
      <circle cx="${w*0.3}" cy="${h*0.35}" r="${w*0.18}" fill="rgba(255,255,255,0.35)"/>
      <circle cx="${w*0.7}" cy="${h*0.7}" r="${w*0.25}" fill="rgba(255,255,255,0.25)"/>
    </svg>
  `)}`;
}

/* ---------------- Helpers ---------------- */
function activeFolder(){
  return state.folders.find(f=>f.id===state.activeFolderId);
}
function initials(name){
  return (name||'?').trim().split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase();
}
function fmtDate(key){
  const d = new Date(key+'T00:00:00');
  return d.toLocaleDateString(undefined,{ weekday:'short', month:'short', day:'numeric' });
}

BINDERS.invite = () => {
  document.getElementById('back').onclick = () => navigate('home');
  bindBottomNav('home');
  const f = activeFolder();
  const message = `Join me on Duo — our shared photo folder "${f.name}". Use this code: ${f.inviteCode}`;

  document.getElementById('copyCode').onclick = () => {
    navigator.clipboard?.writeText(f.inviteCode).catch(()=>{});
    showToast('Code copied');
  };
  document.getElementById('shareCode').onclick = async () => {
    if(navigator.share){
      try{ await navigator.share({ title:'Join me on Duo', text: message }); }
      catch(e){ /* user cancelled */ }
    } else {
      navigator.clipboard?.writeText(message).catch(()=>{});
      showToast('Sharing isn\'t available here — message copied instead');
    }
  };
  document.getElementById('shareSms').onclick = () => {
    window.open(`sms:?body=${encodeURIComponent(message)}`, '_blank');
  };
  document.getElementById('shareWhatsapp').onclick = () => {
    window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
  };
  document.getElementById('shareMail').onclick = () => {
    window.open(`mailto:?subject=${encodeURIComponent('Join me on Duo')}&body=${encodeURIComponent(message)}`, '_blank');
  };
  document.getElementById('doneInvite').onclick = () => navigate('journal');
  document.getElementById('skipInvite').onclick = () => navigate('journal');
};

/* ---------- JOURNAL (folder view) ---------- */
SCREENS.journal = () => {
  const f = activeFolder();
  if(!f) return SCREENS.home();
  const today = todayKey();
  const plan = planOf(f.plan);
  const myId = state.user?.id;

  const todayEntry = f.entries.find(e=>e.date===today);
  const myPostToday = todayEntry?.posts.find(p=>p.authorId===myId);
  const sortedDays = [...f.entries].sort((a,b)=> b.date.localeCompare(a.date));
  const pastDays = sortedDays.filter(e=>e.date!==today && e.posts.length>0);

  function memberRow(m){
    const post = todayEntry?.posts.find(p=>p.authorId===m.id);
    const isMe = m.id === myId;
    if(post){
      return `
      <div class="card fade-in" style="padding:16px; margin-bottom:12px;">
        <div class="row gap8" style="margin-bottom:10px;">
          <div style="width:26px;height:26px;border-radius:50%;background:var(--blush-light);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;color:var(--wine-dark);flex-shrink:0;">${initials(m.name)}</div>
          <p style="font-size:13px; font-weight:500;">${isMe?'You':m.name}</p>
        </div>
        <div class="row gap8" style="overflow-x:auto; padding-bottom:2px;">
          ${post.photos.map((src,i)=>`
            <div style="position:relative; flex-shrink:0;">
              <img src="${src}" style="width:140px;height:140px;object-fit:cover;border-radius:14px;" />
              <button class="icon-btn dl-btn" data-src="${src}" data-name="${f.name}-${post.date||today}-${i+1}" style="position:absolute; bottom:6px; right:6px; width:30px; height:30px; background:rgba(255,255,255,0.85);">${icon('download')}</button>
            </div>
          `).join('')}
        </div>
        <p style="font-size:14px; line-height:1.5; margin-top:10px;">${post.caption}</p>
      </div>`;
    }
    return `
      <div class="card fade-in center" style="padding:16px; margin-bottom:12px; flex-direction:column; border-style:dashed; background:rgba(255,255,255,0.5);">
        <div style="width:26px;height:26px;border-radius:50%;background:var(--cream-2);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;color:var(--ink-soft);margin-bottom:8px;">${initials(m.name)}</div>
        <p class="muted" style="font-size:13px;">${isMe?"You haven't posted today":`${m.name} hasn't posted yet`}</p>
        ${isMe ? `<button class="btn btn-primary btn-sm" id="addTodayBtn" style="margin-top:10px;">${icon('plus')} Add your photo</button>` : ''}
      </div>`;
  }

  return `
  <div class="topbar">
    <button class="icon-btn" id="back">${icon('arrowLeft')}</button>
    <h1 style="font-size:18px;">${f.name}</h1>
    <button class="icon-btn" id="folderInfo">${icon('user')}</button>
  </div>

  <div class="scroll-area">
    <p class="muted" style="font-size:12.5px; margin:6px 2px 10px; text-transform:uppercase; letter-spacing:0.04em;">Today · ${fmtDate(today)}</p>
    ${f.members.map(memberRow).join('')}

    <div class="card fade-in" style="padding:14px 16px; margin-top:4px;">
      <p class="muted" style="font-size:12px; margin-bottom:10px;">Today's chat</p>
      <div id="chatList" class="stack gap8" style="max-height:180px; overflow-y:auto; margin-bottom:10px;">
        ${(todayEntry?.chat||[]).length===0 ? `<p class="muted" style="font-size:12.5px;">No messages yet — say something about today's photo.</p>` : (todayEntry.chat).map(m=>`
          <div style="align-self:${m.authorId===myId?'flex-end':'flex-start'}; max-width:80%;">
            <div style="background:${m.authorId===myId?'var(--blush-light)':'var(--cream-2)'}; padding:8px 12px; border-radius:14px;">
              <p style="font-size:13.5px; line-height:1.4;">${m.text}</p>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="row gap8">
        <input class="field" id="chatInput" placeholder="Write a message..." style="flex:1;" />
        <button class="icon-btn" id="sendChat" style="background:var(--wine); flex-shrink:0;">${icon('send').replace('<svg ', '<svg style="stroke:#fff" ')}</button>
      </div>
    </div>

    ${pastDays.length > 0 ? `<p class="muted" style="font-size:12.5px; margin:22px 2px 10px; text-transform:uppercase; letter-spacing:0.04em;">Earlier</p>` : ''}
    <div class="stack gap12">
      ${pastDays.map(e=>`
        <div class="card fade-in" style="padding:12px;" data-day="${e.date}">
          <p style="font-size:13px; font-weight:500; margin-bottom:8px;">${fmtDate(e.date)}</p>
          <div class="row gap8" style="overflow-x:auto;">
            ${e.posts.map(p=>`<img src="${p.photos[0]}" style="width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;" />`).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  </div>

  ${bottomNav('home')}
  `;
};
BINDERS.journal = () => {
  const f = activeFolder();
  document.getElementById('back').onclick = () => navigate('home');
  document.getElementById('folderInfo').onclick = () => navigate('folderSettings');
  document.getElementById('addTodayBtn')?.addEventListener('click', ()=> navigate('upload'));
  bindBottomNav('home');

  document.querySelectorAll('.dl-btn').forEach(btn=>{
    btn.onclick = (ev) => {
      ev.stopPropagation();
      const a = document.createElement('a');
      a.href = btn.dataset.src;
      a.download = (btn.dataset.name || 'duo-photo').replace(/\s+/g,'-') + '.jpg';
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      a.remove();

    };
  });

  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendChat');
  sendBtn.onclick = () => sendChatMsg();
  chatInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') sendChatMsg(); });
  async function sendChatMsg(){
    const text = chatInput.value.trim();
    if(!text) return;
    chatInput.value = '';
    sendBtn.setAttribute('disabled','');
    await sendChatRemote(f.id, text);
    sendBtn.removeAttribute('disabled');
    navigate('journal');
  }

  // Pull in any photos/messages the partner may have added since we last looked.
  refreshFolders().then(()=>{
    if(current && current.dataset.screen === 'journal'){
      navigate('journal');
    }
  });
};

BINDERS.upload = () => {
  document.getElementById('back').onclick = () => navigate('journal');
  bindBottomNav('home');
  const f = activeFolder();
  const plan = planOf(f.plan);
  const drop = document.getElementById('photoDrop');
  const input = document.getElementById('fileInput');
  const hint = document.getElementById('dropHint');
  const thumbRow = document.getElementById('thumbRow');
  const postBtn = document.getElementById('postBtn');
  const noteInput = document.getElementById('noteInput');
  const noteHint = document.getElementById('noteHint');
  let files = [];      // raw File objects, sent to Supabase Storage
  let previews = [];   // base64 data URLs, for instant local preview only

  function renderThumbs(){
    thumbRow.innerHTML = previews.map((src,i)=>`
      <div style="position:relative; width:64px; height:64px;">
        <img src="${src}" style="width:100%; height:100%; object-fit:cover; border-radius:10px;" />
        <button class="rm-thumb" data-i="${i}" style="position:absolute; top:-6px; right:-6px; width:20px; height:20px; border-radius:50%; background:var(--wine); color:#fff; font-size:12px; line-height:20px; text-align:center;">×</button>
      </div>
    `).join('');
    document.querySelectorAll('.rm-thumb').forEach(btn=>{
      btn.onclick = () => {
        const i = Number(btn.dataset.i);
        files.splice(i,1);
        previews.splice(i,1);
        renderThumbs();
        updateState();
      };
    });
    hint.style.display = previews.length >= plan.dailyPhotos ? 'none' : 'block';
    drop.style.pointerEvents = previews.length >= plan.dailyPhotos ? 'none' : 'auto';
    drop.style.opacity = previews.length >= plan.dailyPhotos ? '0.5' : '1';
  }

  function updateState(){
    const hasPhoto = previews.length > 0;
    const hasNote = noteInput.value.trim().length > 0;
    postBtn.toggleAttribute('disabled', !(hasPhoto && hasNote));
    noteHint.textContent = hasPhoto && !hasNote ? 'Add a short note — it can\'t be left empty' : '';
  }

  drop.onclick = () => { if(previews.length < plan.dailyPhotos) input.click(); };
  input.onchange = () => {
    const picked = Array.from(input.files).slice(0, plan.dailyPhotos - previews.length);
    if(picked.length === 0) return;
    picked.forEach(file=>{
      files.push(file);
      const reader = new FileReader();
      reader.onload = (e) => {
        previews.push(e.target.result);
        renderThumbs();
        updateState();
      };
      reader.readAsDataURL(file);
    });
    input.value = '';
  };
  noteInput.addEventListener('input', updateState);

  postBtn.onclick = async () => {
    const caption = noteInput.value.trim();
    if(files.length === 0){ showToast('Add at least one photo'); return; }
    if(!caption){ showToast('Write a note first — it can\'t be empty'); return; }

    postBtn.setAttribute('disabled','');
    const prevText = postBtn.innerHTML;
    postBtn.innerHTML = 'Sharing…';

    const photoUrls = await uploadPhotosRemote(f.id, files);
    if(photoUrls.length === 0){
      postBtn.removeAttribute('disabled');
      postBtn.innerHTML = prevText;
      showToast('Photo upload failed — try again');
      return;
    }
    const ok = await postEntryRemote(f.id, photoUrls, caption);
    postBtn.removeAttribute('disabled');
    postBtn.innerHTML = prevText;
    if(!ok) return;

    showToast('Shared for today 💛');
    navigate('journal');
  };
  renderThumbs();
};

/* ---------- Boot ---------- */
function showBootScreen(){
  stack.innerHTML = `
    <div class="screen active" style="display:flex; align-items:center; justify-content:center;">
      <div style="text-align:center;">
        <div style="width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--wine),var(--wine-light));margin:0 auto 14px;display:flex;align-items:center;justify-content:center;">
          ${icon('heart','').replace('<svg ', '<svg style="width:24px;height:24px;stroke:#fff;fill:#fff;opacity:0.95" ')}
        </div>
        <p class="muted" style="font-size:13px;">Loading Duo…</p>
      </div>
    </div>`;
  current = stack.firstElementChild;
}

let lastKnownUserId = undefined; // undefined = not checked yet, null = signed out

async function boot(){
  showBootScreen();
  try{
    await refreshSessionAndProfile();
    lastKnownUserId = state.user?.id || null;
    if(state.user){
      await refreshFolders();
      if(state.folders.length > 0) state.activeFolderId = state.folders[0].id;
      navigate('home');
    }else{
      navigate('auth');
    }
  }catch(err){
    console.error('boot() failed:', err);
    navigate('auth');
    showToast('Something went wrong loading your account — please try again');
  }
}

// React only to genuine sign-in/sign-out transitions — not tab refocus
// "SIGNED_IN" re-fires, and not the INITIAL_SESSION event (boot() already
// handles the first load).
sb.auth.onAuthStateChange((event, session) => {
  const newUserId = session?.user?.id || null;
  if(event === 'SIGNED_IN' && newUserId !== lastKnownUserId){
    lastKnownUserId = newUserId;
    boot();
  }else if(event === 'SIGNED_OUT'){
    lastKnownUserId = null;
    state.user = null;
    state.folders = [];
    navigate('auth');
  }
});

boot();
</script>
